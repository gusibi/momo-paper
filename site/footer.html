<footer class="footer">
  <style>
    .footer {
      border-top: 1px solid var(--border);
      padding: var(--space-2xl) 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .footer__inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .footer__left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .footer__right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition);
    }
    .footer a:hover {
      color: var(--accent);
    }
    .footer__divider {
      color: var(--border);
    }
    @media (max-width: 600px) {
      .footer__inner { flex-direction: column; text-align: center; }
      .footer__left, .footer__right { flex-wrap: wrap; justify-content: center; }
    }
    @media print {
      .footer { display: none; }
    }
  </style>
  <div class="footer__inner">
    <div class="footer__left">
      <span>Momo Paper v0.2.2</span>
      <span class="footer__divider">&middot;</span>
      <span>MIT License</span>
      <span class="footer__divider">&middot;</span>
      <span>by <a href="https://github.com/gusibi">gusibi</a></span>
    </div>
    <div class="footer__right">
      <a href="https://github.com/gusibi/momo-paper">GitHub</a>
      <a href="/guide/">使用指南</a>
      <a href="/types/">文档类型</a>
    </div>
  </div>
</footer>
