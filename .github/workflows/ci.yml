name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Verify Skill bundle
        run: |
          ./scripts/sync-skill.sh
          git diff --exit-code -- momo-paper-skill
          ./momo-paper-skill/momo schema list
          ./momo-paper-skill/momo validate examples/deep-research.md --json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check momo_dsl tests scripts/generate-schema-references.py
